  <rect x="331" y="15" width="14" height="14" fill="none" stroke="white" stroke-width="1"/>
  <rect x="15" y="151" width="14" height="14" fill="none" stroke="white" stroke-width="1"/>
  <rect x="331" y="151" width="14" height="14" fill="none" stroke="white" stroke-width="1"/>

  <!-- LETICIA CLINIC -->
  <text x="180" y="96" font-family="'Didot', 'Bodoni MT', 'Times New Roman', serif" font-size="30" font-weight="400" fill="white" text-anchor="middle" letter-spacing="5">LETICIA CLINIC</text>

  <!-- GINZA -->
